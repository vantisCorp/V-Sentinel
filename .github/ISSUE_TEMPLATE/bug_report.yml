name: Bug Report
description: Report a bug in V-Sentinel
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: V-Sentinel Version
      placeholder: "e.g., 2.1.2"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - Core
        - AI Engine
        - AI Security
        - Quantum/PQC
        - Zero Trust
        - Shadow AI
        - Deepfake Detection
        - Network/PQC-TLS
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Configure '...'
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Error Output
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker/Kubernetes
    validations:
      required: true