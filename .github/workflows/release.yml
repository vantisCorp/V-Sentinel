name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # Build CLI Release Artifacts
  # ============================================================================
  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build release
        working-directory: v-sentinel-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        working-directory: v-sentinel-cli/target/${{ matrix.target }}/release
        run: |
          tar czf v-sentinel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz v-sentinel
          mv v-sentinel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ github.workspace }}/

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        working-directory: v-sentinel-cli/target/${{ matrix.target }}/release
        run: |
          7z a v-sentinel-${{ github.ref_name }}-${{ matrix.target }}.zip v-sentinel.exe
          mv v-sentinel-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ github.workspace }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-sentinel-${{ matrix.target }}
          path: v-sentinel-${{ github.ref_name }}-${{ matrix.target }}.*

  # ============================================================================
  # Build Windows Installer (NSIS)
  # ============================================================================
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows CLI
        uses: actions/download-artifact@v4
        with:
          name: v-sentinel-x86_64-pc-windows-msvc
          path: installer/windows/bin

      - name: Extract CLI binary
        working-directory: installer/windows/bin
        run: |
          7z x v-sentinel-*.zip
          mv v-sentinel.exe V-Sentinel.exe

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Installer
        working-directory: installer/windows
        run: |
          makensis v-sentinel-installer.nsi
          mv V-Sentinel-Setup.exe ${{ github.workspace }}/V-Sentinel-${{ github.ref_name }}-windows-x86_64-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-sentinel-windows-installer
          path: V-Sentinel-${{ github.ref_name }}-windows-x86_64-setup.exe

  # ============================================================================
  # Build Linux AppImage
  # ============================================================================
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux CLI
        uses: actions/download-artifact@v4
        with:
          name: v-sentinel-x86_64-unknown-linux-gnu
          path: build

      - name: Extract CLI binary
        working-directory: build
        run: |
          tar xzf v-sentinel-*.tar.gz
          chmod +x v-sentinel

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        working-directory: installer/linux
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp ../../build/v-sentinel AppDir/usr/bin/V-Sentinel
          chmod +x AppDir/usr/bin/V-Sentinel
          
          # Create desktop file
          cat > AppDir/v-sentinel.desktop << 'EOF'
          [Desktop Entry]
          Name=V-Sentinel
          Exec=v-sentinel
          Icon=v-sentinel
          Type=Application
          Categories=Security;System;
          Comment=AI-Powered Security Sentinel
          Terminal=true
          EOF
          
          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/V-Sentinel" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Build AppImage
          ARCH=x86_64 appimagetool AppDir V-Sentinel-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-sentinel-linux-appimage
          path: installer/linux/V-Sentinel-${{ github.ref_name }}-x86_64.AppImage

  # ============================================================================
  # Build macOS DMG
  # ============================================================================
  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-cli
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: intel
          - target: aarch64-apple-darwin
            arch: apple-silicon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS CLI
        uses: actions/download-artifact@v4
        with:
          name: v-sentinel-${{ matrix.target }}
          path: build

      - name: Extract CLI binary
        working-directory: build
        run: |
          tar xzf v-sentinel-*.tar.gz
          chmod +x v-sentinel

      - name: Build DMG
        working-directory: installer/macos
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          # Create DMG contents
          mkdir -p dmg_contents
          cp ../../build/v-sentinel dmg_contents/V-Sentinel
          chmod +x dmg_contents/V-Sentinel
          
          # Create Applications symlink
          ln -s /Applications dmg_contents/Applications
          
          # Create DMG
          hdiutil create -volname "V-Sentinel" -srcfolder dmg_contents -ov -format UDZO \
            V-Sentinel-${{ github.ref_name }}-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v-sentinel-macos-${{ matrix.arch }}-dmg
          path: installer/macos/V-Sentinel-${{ github.ref_name }}-${{ matrix.arch }}.dmg

  # ============================================================================
  # Create Release
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-windows-installer, build-linux-appimage, build-macos-dmg]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" \) -exec mv {} release_files/ \;

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.md
          else
            echo "First release"
            git log --pretty=format:"- %s (%h)" -20 > CHANGELOG.md
          fi
          
          # Build release notes
          cat > RELEASE_NOTES.md << 'EOF'
          # V-Sentinel ${{ github.ref_name }}

          ## 🛡️ What's New

          EOF
          cat CHANGELOG.md >> RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md << 'EOF'

          ## 📦 Downloads

          ### CLI Binaries
          | Platform | Architecture | Download |
          |----------|-------------|----------|
          | Linux | x86_64 | v-sentinel-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz |
          | Windows | x86_64 | v-sentinel-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip |
          | macOS | Intel | v-sentinel-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz |
          | macOS | Apple Silicon | v-sentinel-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz |

          ### GUI Installers
          | Platform | Architecture | Download |
          |----------|-------------|----------|
          | Windows | x86_64 | V-Sentinel-${{ github.ref_name }}-windows-x86_64-setup.exe |
          | Linux | x86_64 | V-Sentinel-${{ github.ref_name }}-x86_64.AppImage |
          | macOS | Intel | V-Sentinel-${{ github.ref_name }}-intel.dmg |
          | macOS | Apple Silicon | V-Sentinel-${{ github.ref_name }}-apple-silicon.dmg |

          ## 🚀 Features

          - ⚛️ Post-Quantum Cryptography (Crystals-Kyber, Crystals-Dilithium)
          - 🧠 AI-Native Threat Detection (Deep Learning, Federated Learning)
          - 🔐 Privacy-Preserving Technologies (Zero-Knowledge Proofs, Differential Privacy)
          - 👆 Multi-Modal Biometrics (Fingerprint, Facial, Voice, Behavioral)
          - 🤖 Autonomous Security Agents
          - 🌐 Metaverse Security (VR/AR Protection)
          - ⛓️ Blockchain-Based Threat Reputation

          ## 📋 Requirements

          - Windows 10/11 (for Windows installer)
          - Linux x86_64 with glibc 2.31+ (for Linux)
          - macOS 11+ (Big Sur) for Intel, macOS 12+ (Monterey) for Apple Silicon

          ## 📚 Documentation

          - [Installation Guide](https://github.com/sndrsmnk/V-Sentinel/blob/main/INSTALL.md)
          - [Developer Guide](https://github.com/sndrsmnk/V-Sentinel/blob/main/docs/DEVELOPER_GUIDE.md)

          ## 🔧 Installation

          ### Windows
          Download the `.exe` installer and run it. Follow the installation wizard.

          ### Linux
          ```bash
          chmod +x V-Sentinel-*.AppImage
          ./V-Sentinel-*.AppImage
          ```

          ### macOS
          Open the `.dmg` file and drag V-Sentinel to Applications.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Notify Discord
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: release
    
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **New V-Sentinel Release!**
            
            Version: ${{ github.ref_name }}
            
            📦 Download: https://github.com/sndrsmnk/V-Sentinel/releases/tag/${{ github.ref_name }}
            
            🛡️ Features:
            • Post-Quantum Cryptography
            • AI-Native Threat Detection
            • Privacy-Preserving Technologies
            • Multi-Modal Biometrics
            • Autonomous Security Agents
            • Metaverse Security
            
            💻 Installers available for Windows, Linux, and macOS!