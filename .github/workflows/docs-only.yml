name: Documentation CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'
      - '**.html'
      - '.github/workflows/docs-only.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'
      - '**.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown links
        run: |
          # Install markdown-link-check
          npm install -g markdown-link-check

          # Check all markdown files
          find . -name "*.md" -type f -exec markdown-link-check {} \; || true

      - name: Validate HTML syntax
        run: |
          # Install html5validator
          pip install html5validator

          # Validate all HTML files
          html5validator --root docs/ || true

      - name: Check for broken internal links
        run: |
          # Check if all referenced files exist
          echo "Checking documentation structure..."
          [ -f "docs/API_DOCUMENTATION.md" ] || echo "Warning: API_DOCUMENTATION.md not found"
          [ -f "docs/dashboard.html" ] || echo "Warning: dashboard.html not found"
          [ -f "README.md" ] || echo "Warning: README.md not found"

      - name: Generate documentation stats
        run: |
          echo "## Documentation Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Lines | Words |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          
          for file in docs/*.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              words=$(wc -w < "$file")
              echo "| $(basename $file) | $lines | $words |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          for file in docs/*.html; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              echo "| $(basename $file) | $lines | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: validate-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: ./docs