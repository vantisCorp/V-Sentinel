version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/sdks/python"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "typescript"

  - package-ecosystem: "gomod"
    directory: "/sdks/go"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "go"