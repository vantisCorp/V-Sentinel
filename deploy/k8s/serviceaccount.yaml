apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinel
  namespace: sentinel
  labels:
    app: sentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sentinel
  namespace: sentinel
  labels:
    app: sentinel
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sentinel
  namespace: sentinel
  labels:
    app: sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sentinel
subjects:
- kind: ServiceAccount
  name: sentinel
  namespace: sentinel