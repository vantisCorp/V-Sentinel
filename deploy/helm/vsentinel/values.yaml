# V-Sentinel Helm Chart Values

replicaCount: 3

image:
  repository: vantis/vsentinel
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  httpsPort: 443
  httpsTargetPort: 8443
  metricsPort: 9090

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: sentinel.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vsentinel-tls
      hosts:
        - sentinel.example.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - vsentinel
          topologyKey: kubernetes.io/hostname

# Database configuration
database:
  host: postgres
  port: 5432
  name: vsentinel
  user: vsentinel
  existingSecret: vsentinel-db-credentials

# Redis configuration
redis:
  host: redis
  port: 6379
  db: 0
  existingSecret: vsentinel-redis-credentials

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s

# Logging configuration
logging:
  level: info
  format: json

# Security configuration
security:
  level: high
  enableAuditLog: true
  sessionTimeout: 3600

# Privacy configuration
privacy:
  enableZkp: true
  zkpBackend: bulletproofs
  dpEpsilon: 1.0

# Quantum configuration
quantum:
  algorithm: crystals-kyber
  keyRotationInterval: 86400
