apiVersion: v1
kind: Service
metadata:
  name: sentinel
  namespace: sentinel
  labels:
    app: sentinel
    component: security
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: sentinel
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-headless
  namespace: sentinel
  labels:
    app: sentinel
    component: security
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app: sentinel