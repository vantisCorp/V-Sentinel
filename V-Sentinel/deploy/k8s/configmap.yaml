apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel
  labels:
    app: sentinel
data:
  sentinel.toml: |
    [core]
    app_name = "SENTINEL"
    version = "0.1.0"
    environment = "production"
    debug = false
    data_dir = "/var/lib/sentinel"
    cache_dir = "/var/cache/sentinel"
    log_dir = "/var/log/sentinel"
    max_concurrent_ops = 100
    operation_timeout_secs = 30

    [ai]
    model_path = "/var/lib/sentinel/models"
    model_type = "neural_network"
    batch_size = 32
    inference_threads = 4
    enable_npu = false
    enable_gpu = false
    cache_size_mb = 1024
    prediction_timeout_ms = 1000

    [gaming]
    enabled = true
    auto_detect = true
    zero_scan_mode = true
    anti_ddos = true
    ram_defolding = true
    ai_overclocking = true
    trusted_handshake = true
    game_list = []

    [quantum]
    enabled = true
    kem_algorithm = "crystals_kyber768"
    signature_algorithm = "crystals_dilithium3"
    hybrid_mode = true
    key_rotation_hours = 24

    [network]
    listen_address = "0.0.0.0"
    listen_port = 8080
    enable_tls = false
    max_connections = 1000
    connection_timeout_secs = 30
    enable_rate_limiting = true
    rate_limit_rpm = 60

    [logging]
    level = "Info"
    format = "Json"
    console = true
    file = true
    file_path = "/var/log/sentinel/sentinel.log"
    max_file_size_mb = 100
    max_files = 10
    structured = true

    [security]
    enable_secure_boot = true
    enable_immutable_partition = true
    enable_hardware_attestation = true
    enable_tpm = true
    enable_secure_enclave = false
    audit_logging = true
    audit_log_path = "/var/log/sentinel/audit.log"

    [performance]
    cpu_limit_percent = 80.0
    memory_limit_mb = 2048
    enable_profiling = false
    profile_interval_secs = 60
    enable_metrics = true
    metrics_interval_secs = 30
    enable_caching = true
    cache_ttl_secs = 3600