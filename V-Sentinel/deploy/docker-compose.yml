version: '3.8'

services:
  sentinel:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinel
    ports:
      - "8080:8080"  # API
      - "9090:9090"  # Metrics
    volumes:
      - ./config/sentinel.toml:/etc/sentinel/sentinel.toml:ro
      - sentinel-data:/var/lib/sentinel
      - sentinel-cache:/var/cache/sentinel
      - sentinel-logs:/var/log/sentinel
    environment:
      - SENTINEL_ENVIRONMENT=production
      - SENTINEL_LOG_LEVEL=info
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sentinel-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sentinel-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - sentinel-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - sentinel-network

  loki:
    image: grafana/loki:2.9.4
    container_name: sentinel-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - sentinel-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: sentinel-promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - sentinel-logs:/var/log/sentinel:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - sentinel-network

volumes:
  sentinel-data:
    driver: local
  sentinel-cache:
    driver: local
  sentinel-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  sentinel-network:
    driver: bridge